# Site Settings
locale: "en-US"
title: "Growth Science"
title_separator: "-"
name: "Geoff Scott"
description: "Executive coaching and advisory services grounded in trust, clarity, and human-centered leadership"
url: "https://geoffscott.github.io"
baseurl: "/growthscience-site"
logo: "/assets/images/logo.svg"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jemoji

# Pagination
paginate: 10
paginate_path: /page:num/

# Reading Files
include: ["_pages"]
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .jekyll-cache
  - .jekyll-metadata
  - .ruby-version
  - .travis.yml
  - /docs
  - /test
  - Gemfile
  - Gemfile.lock
  - node_modules
  - npm-debug.json

# Collections
collections:
  kindness_flywheel:
    output: true
    permalink: /kindness-flywheel/:path/

# Front Matter Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      toc: false
      toc_sticky: false

  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

  # Kindness Flywheel collection
  - scope:
      path: ""
      type: kindness_flywheel
    values:
      layout: single
      author_profile: false
      read_time: true

# Navigation
masthead:
  nav: "main"

# Author Profile
author:
  name: "Geoff Scott"
  avatar: "/assets/images/logo.svg"
  bio: "Executive Coach & Strategic Advisor"
  location: "Hudson Valley, NY"
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/geoffscott"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/geoffscott"

# Footer
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/geoffscott"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/geoffscott"

# Copyright
copyright: "© 2026 Growth Science LLC. All rights reserved."

# Search
search: true
