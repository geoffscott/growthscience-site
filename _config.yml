# Site Settings
locale: "en-US"
title: "The Kindness Flywheel"
title_separator: "-"
subtitle: "The moat has shifted from what you build to how you treat people"
name: "Geoff Scott"
description: "Exploring why kindness is the competitive advantage in the AI era"
url: "https://geoffscott.github.io"
baseurl: "/kindness-flywheel"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jemoji

# Pagination
paginate: 10
paginate_path: /page:num/

# Reading Files
include: ["_pages"]
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .jekyll-cache
  - .jekyll-metadata
  - .ruby-version
  - .travis.yml
  - /docs
  - /test
  - Gemfile
  - Gemfile.lock
  - node_modules
  - npm-debug.json

# Front Matter Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      toc: false
      toc_sticky: false

  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

# Author Profile
author:
  name: "Geoff Scott"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "CTO at OneEleven. Executive coach. Builder."
  location: "Hudson Valley, NY"
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/geoffscott"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/geoffscott"
    - label: "Growth Science"
      icon: "fas fa-globe"
      url: "https://growthscience.com"

# Footer Links
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/geoffscott"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/geoffscott"

# Navigation
navigation_pages: true

# Search
search: true

# Custom Colors & Fonts (override in _sass/_variables.scss if needed)
# Customization guide: See assets/css/custom.css
